baseURL = "https://blog.xushuo.uk/"
languageCode = "zh-cn"
title = "高杰峰的博客"
theme = "PaperMod"
defaultContentLanguage = "zh"
hasCJKLanguage = true
enableRobotsTXT = true

[pagination]
pagerSize = 10

[minify]
disableXML = true
minifyOutput = true

[params]
env = "production"
title = "高杰峰的博客"
description = "记录 VPS、Cloudflare、OpenList、Telegram Bot、AI、学习和生活折腾。"
keywords = ["VPS", "Cloudflare", "OpenList", "Telegram Bot", "AI", "Hugo"]
author = "高杰峰"
DateFormat = "2006-01-02"
defaultTheme = "auto"
disableThemeToggle = false
ShowReadingTime = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = true
UseHugoToc = true
showtoc = true
tocopen = false

[params.homeInfoParams]
Title = "高杰峰的博客"
