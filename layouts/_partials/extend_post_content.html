{{- with .Params.attachments }}
<section class="post-attachments" aria-labelledby="post-attachments-title">
  <h2 id="post-attachments-title">附件</h2>
  <ul>
    {{- range . }}
    {{- $file := .file | default .url }}
    {{- if $file }}
    <li>
      <a href="{{ $file | relURL }}" target="_blank" rel="noopener">
        {{ .name | default (path.Base $file) }}
      </a>
    </li>
    {{- end }}
    {{- end }}
  </ul>
</section>
{{- end }}
